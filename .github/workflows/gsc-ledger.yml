name: GSC Ledger Performance

# הצלבת content-ledger.md (Pal-state) מול GSC — before/after לכל מאמר שפורסם.
# דורש secret בשם GSC_SA_JSON: התוכן המלא של קובץ ה-service account JSON
# (pal-gsc-reader@pal-gsc.iam.gserviceaccount.com).

on:
  schedule:
    - cron: '0 6 * * 1'       # שני 06:00 UTC — אחרי שני ה-pulls האחרים
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: gsc-ledger
  cancel-in-progress: false

jobs:
  measure:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.12'

      - name: Install deps
        run: pip install requests google-api-python-client google-auth

      - name: Run ledger performance
        env:
          GSC_SA_JSON: ${{ secrets.GSC_SA_JSON }}
          LP_OUT_DIR: cats
        run: python ledger_performance.py

      - name: Sanity check
        run: test -s cats/ledger-performance.md

      - name: Commit & push (רק אם השתנה)
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add cats/ledger-performance.md
          git diff --staged --quiet || git commit -m "Ledger performance (automated) $(date -u +%Y-%m-%d)"
          git push
